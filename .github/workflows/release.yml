name: Release

# DISABLED: trigger is workflow_dispatch only — this workflow does not
# fire on push. Re-enable by adding the `push:` trigger back when the
# auto-release pipeline plays nicely with the docker-image release
# (currently semantic-release tagging conflicts with image publishing
# because there's no shared registry yet).
#
# When re-enabled, the workflow bumps the version in pyproject.toml,
# tags, and creates a GitHub Release based on commits landed on main
# since the last tag. Commit parser is gitmoji (configured in
# pyproject.toml's [tool.semantic_release] block). PR squash-merges
# turn into a single commit whose message is the PR title — PR titles
# should carry the right prefix (✨ minor, 🐛/🔧/📝 patch, 💥 major).
#
# Until then: bump pyproject.toml's version manually in the PR that
# warrants it.

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
