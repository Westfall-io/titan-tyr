name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest -q

  migrations:
    name: alembic check + round-trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: titan
          POSTGRES_PASSWORD: titan
          POSTGRES_DB: titan_tyr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U titan -d titan_tyr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql+asyncpg://titan:titan@localhost:5432/titan_tyr"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e .
      - name: Upgrade to head
        run: alembic upgrade head
      - name: alembic check (model/migration drift)
        run: alembic check
      - name: Round-trip — downgrade base
        run: alembic downgrade base
      - name: Round-trip — upgrade head
        run: alembic upgrade head

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t titan-tyr:ci .
